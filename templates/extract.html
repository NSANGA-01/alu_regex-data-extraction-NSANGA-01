<!DOCTYPE html>
<html>
<head>
    <title>Regex Data Extraction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #FFB6C1;
            padding: 30px;
            border-radius: 10px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        form {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        h3 {
            color: #333;
            margin-top: 15px;
            margin-bottom: 8px;
            font-size: 1em;
        }

        p {
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            margin: 5px auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            font-size: 0.95em;
        }

        hr {
            margin: 20px auto;
            width: 90%;
            border: none;
            border-top: 2px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Regex Data Extraction Tool (Flask)</h2>

    <form method="POST">
        <button type="submit">Extract Info</button>
    </form>

    <hr>

    <h3>Emails:</h3>
    <p>{{ emails }}</p>

    <h3>URLs:</h3>
    <p>{{ urls }}</p>

    <h3>Phone Numbers:</h3>
    <p>{{ phones }}</p>

    <h3>Credit Cards:</h3>
    <p>{{ credit_cards }}</p>

    <h3>Currency:</h3>
    <p>{{ currency }}</p>
</div>

</body>
</html>
